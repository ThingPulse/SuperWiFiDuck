name: Build and release firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --disable-pip-version-check platformio==6.1.18

      - name: Run manifest tests
        run: python -m unittest test.test_app_market

      - name: Build production firmware
        run: pio run -e thingpulse-pendrive-s3

      - name: Generate release assets
        run: |
          VERSION_ARG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION_ARG="$(sed -n 's/^#define VERSION "\([^"]*\)"/\1/p' src/config.h)"
          fi
          python scripts/app_market.py generate \
            --version "${VERSION_ARG}" \
            --output dist/app-market.json \
            --assets-dir dist

      - name: Verify release assets
        run: |
          VERSION_ARG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION_ARG="$(sed -n 's/^#define VERSION "\([^"]*\)"/\1/p' src/config.h)"
          fi
          python scripts/app_market.py validate \
            --manifest dist/app-market.json \
            --assets-dir dist \
            --version "${VERSION_ARG}"

      - name: Upload workflow-dispatch test artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: super-wifi-duck-${{ github.run_number }}
          path: |
            dist/app-market.json
            dist/app-firmware.bin
            dist/logo.png
          if-no-files-found: error

      - name: Create GitHub release and upload assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${GITHUB_REF_NAME}" \
            dist/app-market.json \
            dist/app-firmware.bin \
            dist/logo.png \
            --verify-tag \
            --generate-notes \
            ${PRERELEASE_FLAG}
